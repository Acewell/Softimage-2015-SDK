<h1>Convert Shader SPDL&nbsp;</h1>
<p>This perl script utility will convert old SPDLs to the new SPDLs format. An
old shader SPDL will have a Phenomenon section, this script will replace it with
a MetaShader section.</p>
<p>Usage: convertShaderSPDL.pl &lt;spdl file in> &lt;spld file out></p>
<p>&nbsp;</p>
